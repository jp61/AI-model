<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cats vs Dogs - AI Classifier</title>
  <meta name="description" content="Client-side cat vs dog image classification using TensorFlow.js">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="card">
    <header>
      <h1>Cats vs Dogs</h1>
      <p class="subtitle">AI Image Classifier</p>
    </header>

    <div id="status" class="status" aria-live="polite">
      <span class="spinner" id="model-spinner"></span>
      <span id="status-text">Loading model...</span>
    </div>

    <div id="drop-zone" class="drop-zone" role="button" tabindex="0"
         aria-label="Upload an image by dropping it here or clicking to browse">
      <div id="upload-prompt" class="upload-prompt">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p>Drop an image here</p>
        <p class="hint">or click to browse</p>
      </div>
      <img id="preview-img" class="preview-img" alt="Uploaded image preview" hidden>
      <div id="infer-status" class="infer-status hidden" aria-live="polite">
        <span class="spinner" id="infer-spinner"></span>
        <span id="infer-text">Classifying...</span>
      </div>
      <input type="file" id="file-input" accept="image/*" hidden aria-hidden="true">
    </div>

    <div id="result" class="result" aria-live="polite">
      <div class="result-label" id="result-label"></div>
      <div class="confidence-row">
        <span id="confidence-text"></span>
        <div class="confidence-bar-track">
          <div class="confidence-bar-fill" id="confidence-bar"></div>
        </div>
      </div>
      <button id="try-another" class="btn-secondary">Try another image</button>
    </div>

    <footer class="privacy-note">
      Runs entirely in your browser &mdash; your images never leave this device.
    </footer>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.13.0/dist/tf.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
